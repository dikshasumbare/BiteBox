<!DOCTYPE html>
<html>
<head>
   <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiteBox Cart</title>
    <script src="https://kit.fontawesome.com/0a6ab9c09e.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="images/favicon/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav>
            <div>
             <!-- logo-->
             <img src="images/favicon/newlogo.png" width="100" alt="Logo">
               </div>
              <!-- menu -->
                <ul>
                <li><a href="Home.html">Home</a></li>
                <li><a href="Menu.html">Menu</a></li>
                <li><a href="BiteDeal.html">BiteDeal</a></li>
                <li><a href="Cart.html"><i class="fa-solid fa-cart-arrow-down"></i>Cart</a></li>
                <li><a href="login.html"><i class="fa-solid fa-arrow-right-to-bracket"></i>login</a></li>
                </ul>
            
        </nav>
    </header>
    <section class="cart">
        <table>
            <thead>
                <th>Item</th>
                <th>Price</th>
                <th>Qty</th>
                <th>Total</th>
                <th>Remove</th>
            </thead>
            <tbody>
    <tr>
        <td class="item">
            <img src="images/burger.jpg" alt="Burger">

            <div>
                <h4>Veggies Burger</h4>
                <p>Cheesy burger with fresh veggies</p>
            </div>
        </td>

        <td>₹199</td>

        <td>
            <div class="qty-box">
                <button>-</button>
                <span>1</span>
                <button>+</button>
            </div>
        </td>

        <td>₹199</td>

        <td>
            <button class="remove">Remove</button>
        </td>
    </tr>


<tr>
        <td class="item">
            <img src="images/pizza.png" alt="Burger">

            <div>
                <h4>Capsicum Pizza</h4>
                <p>Cheesy pizza with fresh capsicum</p>
            </div>
        </td>

        <td>₹249</td>

        <td>
            <div class="qty-box">
                <button>-</button>
                <span>1</span>
                <button>+</button>
            </div>
        </td>

        <td>₹199</td>

        <td>
            <button class="remove">Remove</button>
        </td>
    </tr>

    <tr>
        <td class="item">
            <img src="images/Alfredo Pasta.png" alt="Burger">

            <div>
                <h4> Alfredo Pasta </h4>
                <p>Creamy white sauce pasta</p>
            </div>
        </td>

        <td>₹229</td>

        <td>
            <div class="qty-box">
                <button>-</button>
                <span>1</span>
                <button>+</button>
            </div>
        </td>

        <td>₹229</td>

        <td>
            <button class="remove">Remove</button>
        </td>
    </tr>


    <tr class="grand-total">
        <td colspan="3">Grand Total</td>
        <td>₹677</td>
        <td>
            <button class="proceed">Proceed</button>
        </td>
    </tr>

  </tbody>
        </table>
    </section>
