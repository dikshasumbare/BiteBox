<!DOCTYPE html>
<html>
<head>
   <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiteBox Menu</title>
    <script src="https://kit.fontawesome.com/0a6ab9c09e.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="images/favicon/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav>
            <div>
             <!-- logo-->
             <img src="images/favicon/newlogo.png" width="100" alt="Logo">
               </div>
              <!-- menu -->
                <ul>
                <li><a href="Home.html">Home</a></li>
                <li><a href="Menu.html">Menu</a></li>
                <li><a href="BiteDeal.html">BiteDeal</a></li>
                <li><a href="Cart.html"><i class="fa-solid fa-cart-arrow-down"></i>Cart</a></li>
                <li><a href="login.html"><i class="fa-solid fa-arrow-right-to-bracket"></i>login</a></li>
                </ul>
            
        </nav>
    </header>
    <!-- Start Filter Section -->
<div class="category-icons">

    <div class="icon-box">
        <img src="images/meal.png" alt="All">
        <p>All</p>
    </div>

    <div class="icon-box">
        <img src="images/burger.jpg" alt="Burger">
        <p>Burger</p>
    </div>

    <div class="icon-box">
        <img src="images/pizza.png" alt="Pizza">
        <p>Pizza</p>
    </div>

    <div class="icon-box">
        <img src="images/pasta.png" alt="Pasta">
        <p>Pasta</p>
    </div>

    <div class="icon-box">
        <img src="images/fries.png" alt="Fries">
        <p>Fries</p>
    </div>

    <div class="icon-box">
        <img src="images/coffee.png" alt="Coffee">
        <p>Coffee</p>
    </div>

    <div class="icon-box">
        <img src="images/momos.png" alt="Momos">
        <p>Momos</p>
    </div>

</div>
<!-- End Filter Section -->

    <!--start menu section-->
    </section class=menu>

    <div class="menu-container">
     <div class="card">
        <img src="images/burger.jpg">
        <h3>Burger</h3>
        <p>Cheesy Burger</p>
        <span>₹199</span>
        <button>Add to cart</button>
     </div>
      <div class="card">
        <img src="images/pizza.png">
        <h3>Capsicum Pizza</h3>
        <p>Cheesy pizza with fresh capsicum</p>
        <span>₹249</span>
        <button>Add to cart</button>
     </div>
     <div class="card">
        <img src="images/paneer pizza.jpg">
        <h3>Paneer Tikka Pizza</h3>
        <p>Loaded with spicy paneer chunks</p>
        <span>₹299</span>
        <button>Add to cart</button>
    </div>
    <div class="card">
        <img src="images/Alfredo Pasta.png">
        <h3>Alfredo Pasta</h3>
        <p>Creamy white sauce pasta</p>
        <span>₹229</span>
        <button>Add to cart</button>


    
    </body>
    </html>
